<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShapePro - Exclusão de Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A1A;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 40px;
            background: #16162A;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2A2A4A;
        }
        h1 { color: #FD4556; font-size: 24px; }
        p { color: #A0A0B0; line-height: 1.6; }
        form { margin-top: 24px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid #2A2A4A;
            background: #0A0A1A;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #FD4556;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #FF6B6B; }
        .logo { font-weight: 900; font-size: 28px; color: #6C5CE7; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ShapePro AI</div>
        <h1>Solicitar Exclusão de Conta</h1>
        <p>Ao excluir sua conta, todos os seus dados de progresso, treinos e dietas serão removidos permanentemente conforme exigido pela Google Play.</p>
        
        <form action="/api/auth/request-delete" method="POST">
            <input type="email" name="email" placeholder="Seu E-mail" required>
            <input type="password" name="password" placeholder="Sua Senha" required>
            <button type="submit">Excluir Minha Conta Agora</button>
        </form>
        
        <p style="font-size: 12px; margin-top: 20px;">Você também pode excluir sua conta diretamente nas configurações do aplicativo.</p>
    </div>
</body>
</html>
